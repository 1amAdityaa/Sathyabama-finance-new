name: Sathyabama Finance CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: finance-backend/package-lock.json
      - name: Install Dependencies
        run: cd finance-backend && npm ci
      - name: Run Tests
        run: cd finance-backend && npm test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: finance-frontend/package-lock.json
      - name: Install Dependencies
        run: cd finance-frontend && npm ci
      - name: Run Tests
        run: cd finance-frontend && npm test -- --watchAll=false
      - name: Build Frontend
        run: cd finance-frontend && npm run build
